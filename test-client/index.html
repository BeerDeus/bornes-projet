<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<title>Test Borne - Phase 1</title>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<style>
  body { font-family: sans-serif; max-width: 480px; margin: 60px auto; text-align: center; }
  button { font-size: 24px; padding: 20px 40px; border-radius: 12px; border: none; background: #2563eb; color: white; cursor: pointer; }
  button:disabled { background: #9ca3af; }
  #statut, #log { margin-top: 24px; text-align: left; white-space: pre-wrap; font-family: monospace; font-size: 13px; background: #f3f4f6; padding: 12px; border-radius: 8px; }
</style>
</head>
<body>
  <h2>Test Borne - Phase 1</h2>
  <p id="botStatut">Bot : inconnu</p>
  <button id="btnNouvellePartie">Nouvelle Partie (2 joueurs)</button>
  <button id="btnTest7Joueurs">Test 7 joueurs (2 parties chacun, 2 en CE)</button>
  <div id="log"></div>

<script>
  // Backend déployé sur Hostinger (voir README)
  const SERVEUR_URL = "https://bowling.m2s-photo.fr";
  const socket = io(SERVEUR_URL);
  const logEl = document.getElementById("log");
  const btn = document.getElementById("btnNouvellePartie");
  const btn7 = document.getElementById("btnTest7Joueurs");
  const statutEl = document.getElementById("botStatut");

  function log(msg) {
    logEl.textContent += msg + "\n";
  }

  function envoyer(commande) {
    btn.disabled = true;
    btn7.disabled = true;
    log("Envoi commande nouvelle_partie...");
    socket.emit("nouvelle_partie", commande);
  }

  socket.on("connect", () => log("Connecté au serveur."));
  socket.on("disconnect", () => log("Déconnecté du serveur."));

  socket.on("bot_status", (s) => {
    statutEl.textContent = "Bot : " + (s.connecte ? "connecté" : "déconnecté");
  });

  btn.addEventListener("click", () => {
    envoyer({
      nom: "Test",
      joueurs: [
        { nom: "Alice", tarif: "1" },
        { nom: "Bob", bumpers: true, tarif: "CE" },
      ],
    });
  });

  // Scénario demandé le 2026-07-19 : 7 joueurs, tous 2 parties, dont 2 en
  // CE (pas de bouton combo "2 parties" en CE -> 2 clics sur "CE" via
  // parties: 2, cf. _appliquer_tarif_parties / nb_clics côté bot).
  btn7.addEventListener("click", () => {
    envoyer({
      nom: "Test7",
      joueurs: [
        { nom: "Alice", tarif: "2", parties: 2 },
        { nom: "Bob", tarif: "CE", parties: 2 },
        { nom: "Carla", tarif: "2", parties: 2 },
        { nom: "David", tarif: "2", parties: 2 },
        { nom: "Emma", tarif: "CE", parties: 2 },
        { nom: "Felix", tarif: "2", parties: 2 },
        { nom: "Gina", tarif: "2", parties: 2 },
      ],
    });
  });

  socket.on("nouvelle_partie_resultat", (resultat) => {
    log("Résultat : " + JSON.stringify(resultat));
    btn.disabled = false;
    btn7.disabled = false;
  });
</script>
</body>
</html>
